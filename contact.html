<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Amany Galal</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style>
    .contact-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-xl);
      margin-top: calc(var(--spacing-xl) + 50px);
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
    }
    
    .form-control {
      width: 100%;
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      padding: 1rem;
      color: var(--text-primary);
      font-family: var(--font-body);
      border-radius: 4px;
      transition: all var(--transition-fast);
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--accent-gold);
      box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.2);
    }
    
    textarea.form-control {
      min-height: 150px;
      resize: vertical;
    }
    
    .contact-info-block {
      margin-bottom: 2rem;
    }
    
    .contact-info-block h4 {
      color: var(--accent-gold);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }
    
    .contact-info-block p {
      font-size: 1.2rem;
    }

    @media (max-width: 768px) {
      .contact-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <section class="section container">
    <div class="contact-container">
      
      <!-- Contact Info -->
      <div class="reveal">
        <h1 class="h1" style="margin-bottom: 1rem;">Let's work <span class="text-accent">together.</span></h1>
        <p class="text-muted" style="margin-bottom: var(--spacing-lg); max-width: 400px;">
          Have a project in mind, or just want to say hi? I'd love to hear from you. Fill out the form or reach out via email directly.
        </p>
        
        <div class="contact-info-block">
          <h4>Email</h4>
          <p><a href="mailto:hello@amanygalal.com" class="link-underline">hello@amanygalal.com</a></p>
        </div>
        
        <div class="contact-info-block">
          <h4>Location</h4>
          <p>Available Worldwide (Remote)</p>
        </div>
        
        <div class="availability" style="margin-top: 1rem; margin-bottom: 2rem;">
          <div class="availability-dot"></div>
          Available for freelance
        </div>
      </div>

      <!-- Contact Form -->
      <div class="reveal delay-1">
        <form action="#" class="card" style="padding: var(--spacing-lg);">
          <div class="form-group">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
          </div>
          
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
          </div>
          
          <div class="form-group">
            <label for="subject" class="form-label">Subject</label>
            <input type="text" id="subject" class="form-control" placeholder="Project Inquiry" required>
          </div>
          
          <div class="form-group">
            <label for="message" class="form-label">Message</label>
            <textarea id="message" class="form-control" placeholder="Tell me about your project..." required></textarea>
          </div>
          
          <button type="submit" class="btn btn-solid" style="width: 100%;">Send Message</button>
        </form>
      </div>

    </div>
  </section>

  <!-- Scripts -->
  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
